<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GameBizarre – Jeux</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/animations.css" />
</head>
<body>

  <header class="navbar">
    <div class="navbar-brand">
      <span class="brand-star">★</span>
      <a href="index.html" class="brand-name">GameBizarre</a>
    </div>
    <nav class="navbar-links">
      <a href="index.html" class="nav-link">Accueil</a>
      <a href="jeux.html" class="nav-link active">Jeux</a>
      <a href="actualites.html" class="nav-link">Actualités</a>
    </nav>
    <div class="navbar-actions">
      <button class="btn-darkmode" id="darkModeToggle" title="Dark mode">☽</button>
      <a href="auth.html" class="btn-login" id="authBtn">Connexion</a>
      <div class="user-menu hidden" id="userMenu">
        <span class="username-display" id="usernameDisplay"></span>
        <button class="btn-logout" id="logoutBtn">Déconnexion</button>
      </div>
    </div>
  </header>

  <main class="page-main">
    <div class="page-header">
      <h1 class="page-title"><span class="accent">★</span> Catalogue de Jeux</h1>
      <p class="page-subtitle">Notez, commentez et découvrez des jeux vidéo</p>
    </div>

    <!-- Filtres & Recherche -->
    <div class="filters-bar">
      <div class="search-wrapper">
        <input type="text" id="searchGames" placeholder="Rechercher un jeu..." class="search-input" />
        <span class="search-icon">⌕</span>
      </div>
      <div class="filter-group">
        <label>Genre</label>
        <select id="filterGenre" class="filter-select">
          <option value="">Tous</option>
          <option value="action">Action</option>
          <option value="role-playing-games-rpg">RPG</option>
          <option value="shooter">FPS / Shooter</option>
          <option value="adventure">Aventure</option>
          <option value="strategy">Stratégie</option>
          <option value="sports">Sport</option>
          <option value="puzzle">Puzzle</option>
          <option value="indie">Indépendant</option>
          <option value="simulation">Simulation</option>
          <option value="racing">Course</option>
          <option value="fighting">Combat</option>
          <option value="horror">Horreur</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Trier par</label>
        <select id="sortGames" class="filter-select">
          <option value="-rating">Meilleure note</option>
          <option value="-metacritic">Metacritic</option>
          <option value="-released">Plus récents</option>
          <option value="name">Titre A-Z</option>
          <option value="-added">Popularité</option>
        </select>
      </div>
    </div>

    <div class="cards-grid" id="gamesGrid">
      <!-- Généré par JS -->
    </div>
  </main>

  <footer class="footer">
    <p>© 2025 GameBizarre — Tous droits réservés.</p>
  </footer>

  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/jeux.js"></script>
</body>
</html>
