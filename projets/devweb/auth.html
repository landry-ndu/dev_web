<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GameBizarre – Connexion</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/animations.css" />
</head>
<body>

  <header class="navbar">
    <div class="navbar-brand">
      <span class="brand-star">★</span>
      <a href="index.html" class="brand-name">GameBizarre</a>
    </div>
    <nav class="navbar-links">
      <a href="index.html" class="nav-link">Accueil</a>
      <a href="jeux.html" class="nav-link">Jeux</a>
      <a href="actualites.html" class="nav-link">Actualités</a>
    </nav>
    <div class="navbar-actions">
      <button class="btn-darkmode" id="darkModeToggle" title="Dark mode">☽</button>
    </div>
  </header>

  <main class="auth-main">
    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin">Connexion</button>
        <button class="auth-tab" id="tabRegister">Inscription</button>
      </div>

      <!-- Formulaire connexion -->
      <form class="auth-form" id="loginForm">
        <h2 class="auth-title">Bon retour <span class="accent">✦</span></h2>
        <div class="form-group">
          <label for="loginUsername">Pseudo</label>
          <input type="text" id="loginUsername" placeholder="Ton pseudo" required />
        </div>
        <div class="form-group">
          <label for="loginPassword">Mot de passe</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required />
        </div>
        <p class="form-error hidden" id="loginError"></p>
        <button type="submit" class="btn-primary full-width">Se connecter</button>
      </form>

      <!-- Formulaire inscription -->
      <form class="auth-form hidden" id="registerForm">
        <h2 class="auth-title">Rejoindre la communauté <span class="accent">★</span></h2>
        <div class="form-group">
          <label for="regUsername">Pseudo</label>
          <input type="text" id="regUsername" placeholder="Choisis un pseudo" required />
        </div>
        <div class="form-group">
          <label for="regEmail">Email</label>
          <input type="email" id="regEmail" placeholder="email@exemple.com" required />
        </div>
        <div class="form-group">
          <label for="regPassword">Mot de passe</label>
          <input type="password" id="regPassword" placeholder="Au moins 6 caractères" required />
        </div>
        <div class="form-group">
          <label for="regRole">Rôle</label>
          <select id="regRole">
            <option value="user">Utilisateur</option>
            <option value="journalist">Journaliste</option>
          </select>
        </div>
        <p class="form-error hidden" id="registerError"></p>
        <p class="form-success hidden" id="registerSuccess"></p>
        <button type="submit" class="btn-primary full-width">Créer mon compte</button>
      </form>
    </div>
  </main>

  <footer class="footer">
    <p>© 2025 GameBizarre — Tous droits réservés.</p>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/auth-page.js"></script>
</body>
</html>
